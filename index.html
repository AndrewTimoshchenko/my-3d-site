<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geran-5 3D Viewer</title>
    <style>
        /* ГЛОБАЛЬНІ ЗМІННІ ДЛЯ ТЕМНОЇ ТЕМИ */
        :root {
            --bg-color: #0b0c10;
            --text-bright: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        /* ЗМІННІ ДЛЯ СВІТЛОЇ ТЕМИ */
        [data-theme="light"] {
            --bg-color: #f4f6f9;
            --text-bright: #1a202c;
            --btn-bg: rgba(0, 0, 0, 0.05);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-bright);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; /* Ховаємо смуги прокрутки сторінки */
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
        }

        /* МІНІМАЛІСТИЧНИЙ ХЕДЕР */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none; /* Щоб кліки крізь хедер проходили до моделі */
        }

        .logo {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 3px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* КНОПКА ПЕРЕМИКАННЯ ТЕМИ */
        .theme-toggle-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-bright);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            pointer-events: auto; /* Повертаємо клікабельність кнопці */
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .theme-toggle-btn:hover {
            transform: scale(1.03);
            border-color: var(--text-bright);
        }

        /* ГОРДОСТЬ САЙТУ: ВІКНО МОДЕЛІ НА ВЕСЬ ЕКРАН */
        .viewer-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: transparent;
            overflow: hidden;
        }

        .viewer-container iframe {
            width: 100%;
            /* Робимо iframe вищим, щоб надійно обрізати системні бари Sketchfab */
            height: calc(100% + 120px);
            border: 0;
            margin-top: -60px; /* Виштовхуємо верхній бар за межі екрана */
            display: block;
        }

        /* ТЕКСТОВА ПІДКАЗКА ЗНИЗУ */
        .bottom-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.4;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">GERAN-5</div>
        <button class="theme-toggle-btn" id="themeToggle">
            <span id="themeIcon">☀️</span> <span id="themeText">Світла тема</span>
        </button>
    </header>

    <div class="viewer-container">
        <iframe 
            title="Geran-5" 
            allowfullscreen 
            mozallowfullscreen="true" 
            webkitallowfullscreen="true" 
            allow="autoplay; fullscreen; xr-spatial-tracking" 
            xr-spatial-tracking 
            src="https://sketchfab.com/models/33073861b6a24233b0777cf56d1fc741/embed?autospin=0&autostart=1&preload=1&transparent=1&ui_hint=0&ui_infos=0&ui_controls=0&ui_stop=0&ui_watermark=0">
        </iframe>
    </div>

    <div class="bottom-hint">
        ✦ затисніть та обертайте об'єкт ✦
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Світла тема';
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Темна тема';
            }
        });
    </script>

</body>
</html>
