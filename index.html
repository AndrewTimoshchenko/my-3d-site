<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Presentation Viewer</title>
    <style>
        /* ГЛОБАЛЬНІ ЗМІННІ ДЛЯ ТЕМНОЇ ТЕМИ */
        :root {
            --bg-color: #0b0c10;
            --text-bright: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        /* ЗМІННІ ДЛЯ СВІТЛОЇ ТЕМИ */
        [data-theme="light"] {
            --bg-color: #f4f6f9;
            --text-bright: #1a202c;
            --btn-bg: rgba(0, 0, 0, 0.05);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-bright);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .logo {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 3px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* КНОПКА ЗМІНИ ТЕМИ (ДЕКСКТОП) */
        .theme-toggle-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-bright);
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .theme-toggle-btn:hover {
            transform: scale(1.03);
            border-color: var(--text-bright);
        }

        /* КОНТЕЙНЕР ДЛЯ МОДЕЛІ */
        .viewer-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: transparent;
            overflow: hidden;
        }

        /* Налаштування для комп'ютерів */
        .viewer-container iframe {
            width: 100%;
            height: calc(100% + 120px);
            border: 0;
            margin-top: -60px;
            display: block;
        }

        /* Заглушка, яка ховає нижній інтерфейс на мобільних */
        .mobile-mask {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background-color: var(--bg-color);
            z-index: 10;
            transition: background-color 0.3s ease;
        }

        /* 📱 МОБІЛЬНА ОПТИМІЗАЦІЯ (ВЕРТИКАЛЬНИЙ РЕЖИМ) */
        @media (max-width: 767px) and (orientation: portrait) {
            .viewer-container iframe {
                height: 100%;
                margin-top: 0;
            }

            .mobile-mask {
                display: block;
            }

            header {
                padding: 15px 20px;
            }

            /* Переміщуємо кнопку зміни теми в лівий нижній куток, поверх нашої маски */
            .theme-toggle-btn {
                position: absolute;
                bottom: 8px;
                left: 15px;
                transform: none;
                padding: 6px 14px;
                font-size: 0.75rem;
                z-index: 20; 
                white-space: nowrap;
            }

            .theme-toggle-btn:hover {
                transform: scale(1.03);
            }

            .bottom-hint {
                display: none; 
            }
        }

        .bottom-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.4;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">3D Presentation</div>
        <button class="theme-toggle-btn" id="themeToggle">
            <span id="themeIcon">☀️</span> <span id="themeText">Світла тема</span>
        </button>
    </header>

    <div class="viewer-container">
        <div class="mobile-mask"></div>

        <iframe 
            title="Presentation" 
            allowfullscreen 
            mozallowfullscreen="true" 
            webkitallowfullscreen="true" 
            allow="autoplay; fullscreen; xr-spatial-tracking" 
            xr-spatial-tracking 
            src="https://sketchfab.com/models/d56da9a1cadf406fa4006ce99b1ad5bd/embed?autospin=0&autostart=1&preload=1&transparent=1&ui_hint=0&ui_infos=0&ui_controls=0&ui_stop=0&ui_watermark=0">
        </iframe>
    </div>

    <div class="bottom-hint">
        ✦ затисніть та обертайте об'єкт ✦
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Світла тема';
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Темна тема';
            }
        });
    </script>

</body>
</html>
